version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecoclean-db
    environment:
      SA_PASSWORD: "EcoClean@2024"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'EcoClean@2024' -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./EcoClean.API
      dockerfile: Dockerfile
    container_name: ecoclean-api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=EcoCleanDB;User Id=sa;Password=EcoClean@2024;TrustServerCertificate=True
      - JwtSettings__Secret=${JWT_SECRET:-EcoClean-Super-Secret-Key-MinLength-32-Chars!}
      - JwtSettings__Issuer=EcoClean.API
      - JwtSettings__Audience=EcoClean.Client
      - GeminiApiKey=${GEMINI_API_KEY}
      - Payment__BankCode=${BANK_CODE:-MB}
      - Payment__AccountNumber=${BANK_ACCOUNT:-0000000000}
      - MvcBaseUrl=http://mvc:80
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  mvc:
    build:
      context: ./EcoClean.MVC
      dockerfile: Dockerfile
    container_name: ecoclean-mvc
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://api:80/api/
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ecoclean-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mvc
      - api
    restart: unless-stopped

volumes:
  sqldata:
